<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help, I'm Hungry!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fffbf7;
      --surface: #ffffff;
      --primary: #f97316;
      --primary-hover: #ea580c;
      --primary-light: #fff7ed;
      --primary-border: #fed7aa;
      --text-1: #1c1917;
      --text-2: #57534e;
      --text-3: #a8a29e;
      --border: #e7e5e4;
      --shadow: 0 4px 24px rgba(0,0,0,0.09);
      --radius: 18px;
    }

    body.dark {
      --bg: #1a0e00;
      --surface: #2c1a00;
      --primary: #fb923c;
      --primary-hover: #f97316;
      --primary-light: #431407;
      --primary-border: #7c2d12;
      --text-1: #fafaf9;
      --text-2: #a8a29e;
      --text-3: #57534e;
      --border: #44403c;
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--primary);
      letter-spacing: -0.3px;
      cursor: pointer;
    }

    .app-sub {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-top: 2px;
    }

    .dark-btn {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      transition: all 0.14s;
    }

    .dark-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 20px 72px;
    }

    #card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 720px;
      overflow: hidden;
    }

    /* ── Landing ─────────────────────────────────────────────────────────── */
    .landing-wrap {
      padding: 48px 36px 44px;
      text-align: center;
    }

    .landing-hero  { font-size: 3rem; line-height: 1; margin-bottom: 8px; }

    .landing-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .landing-sub {
      font-size: 0.9375rem;
      color: var(--text-2);
      margin-bottom: 38px;
      line-height: 1.5;
    }

    /* Preference sections */
    .pref-section { margin-bottom: 26px; text-align: left; }

    .pref-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .pref-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid;
    }

    .tag-req {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca;
    }

    body.dark .tag-req {
      background: #450a0a;
      color: #f87171;
      border-color: #7f1d1d;
    }

    .tag-opt {
      background: transparent;
      color: var(--text-3);
      border-color: var(--border);
    }

    /* Diet pills */
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }

    .pill {
      padding: 9px 20px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: none;
      color: var(--text-2);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.12s;
      font-family: inherit;
      line-height: 1;
    }

    .pill:hover {
      border-color: var(--primary-border);
      color: var(--primary);
      background: var(--primary-light);
    }

    .pill.active {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Cuisine flag grid */
    .cuisine-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    .cuisine-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
      min-width: 68px;
    }

    .cuisine-btn:hover {
      border-color: var(--primary-border);
      background: var(--primary-light);
    }

    .cuisine-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .cuisine-flag { font-size: 1.75rem; line-height: 1; }

    .cuisine-name {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-3);
      white-space: nowrap;
    }

    .cuisine-btn.active .cuisine-name { color: var(--primary); }
    .cuisine-btn:hover .cuisine-name  { color: var(--primary); }

    /* Feed Me button */
    .btn-feed {
      margin-top: 10px;
      width: 100%;
      padding: 17px;
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.14s, box-shadow 0.14s, transform 0.1s;
      box-shadow: 0 4px 18px rgba(249,115,22,0.38);
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .btn-feed:hover { background: var(--primary-hover); box-shadow: 0 6px 22px rgba(249,115,22,0.45); }
    .btn-feed:active { transform: scale(0.98); }

    .landing-note { font-size: 0.72rem; color: var(--text-3); margin-top: 14px; }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    .loading-wrap { padding: 80px 24px; text-align: center; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }

    .loading-msg { font-size: 1rem; font-weight: 600; color: var(--text-2); }

    /* ── Error ───────────────────────────────────────────────────────────── */
    .error-wrap { padding: 64px 28px; text-align: center; }
    .error-emoji { font-size: 2.5rem; margin-bottom: 14px; }
    .error-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }

    .error-detail {
      font-size: 0.875rem;
      color: var(--text-2);
      margin-bottom: 22px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: monospace;
      word-break: break-all;
    }

    .error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    .btn-retry {
      padding: 11px 26px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.14s;
    }

    .btn-retry:hover { background: var(--primary-hover); }

    .btn-back-ghost {
      padding: 11px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-2);
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.14s;
    }

    .btn-back-ghost:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    /* ── Recipe ──────────────────────────────────────────────────────────── */
    .meal-img-wrap {
      width: 100%; height: 300px;
      background: var(--border);
      overflow: hidden;
    }

    .meal-img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .recipe-body { padding: 28px 32px 36px; }

    .meta-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 12px; align-items: center;
    }

    .badge {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      padding: 4px 12px; border-radius: 999px; border: 1.5px solid;
    }

    .badge-cat  { background: var(--primary-light); color: var(--primary); border-color: var(--primary-border); }
    .badge-area { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .badge-time { background: #fefce8; color: #854d0e; border-color: #fde68a; }

    body.dark .badge-area { background: #052e16; color: #4ade80; border-color: #14532d; }
    body.dark .badge-time { background: #1c1400; color: #fbbf24; border-color: #713f12; }

    .meal-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900; font-size: 2rem;
      line-height: 1.18; letter-spacing: -0.5px;
      margin-bottom: 22px;
    }

    .btn-roll {
      width: 100%; padding: 16px;
      font-size: 1.0625rem; font-weight: 700;
      color: #fff; background: var(--primary);
      border: none; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.14s, transform 0.1s, box-shadow 0.14s;
      box-shadow: 0 4px 18px rgba(249,115,22,0.38);
      font-family: inherit; margin-bottom: 10px;
    }

    .btn-roll:hover  { background: var(--primary-hover); box-shadow: 0 6px 22px rgba(249,115,22,0.45); }
    .btn-roll:active { transform: scale(0.98); }

    .btn-change-prefs {
      width: 100%; padding: 10px;
      font-size: 0.825rem; font-weight: 600;
      color: var(--text-3); background: none;
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; font-family: inherit;
      transition: all 0.14s; margin-bottom: 28px;
    }

    .btn-change-prefs:hover { border-color: var(--primary-border); color: var(--primary); background: var(--primary-light); }

    .divider { height: 1px; background: var(--border); margin-bottom: 28px; }

    .recipe-cols {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 32px; align-items: start;
    }

    .section-label {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--primary); margin-bottom: 14px;
    }

    .ing-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }

    .ing-item { display: flex; gap: 10px; font-size: 0.875rem; line-height: 1.4; align-items: baseline; }
    .ing-measure { font-weight: 700; color: var(--primary); flex-shrink: 0; min-width: 58px; font-size: 0.8rem; }
    .ing-name    { color: var(--text-1); }

    .steps { display: flex; flex-direction: column; gap: 14px; }

    .step { display: flex; gap: 11px; align-items: flex-start; }

    .step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--primary-light); color: var(--primary);
      border: 1.5px solid var(--primary-border);
      font-size: 0.68rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }

    .step-text { font-size: 0.875rem; color: var(--text-2); line-height: 1.6; }

    .recipe-actions { display: flex; gap: 10px; margin-top: 32px; flex-wrap: wrap; }

    .btn-yt {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; font-size: 0.875rem; font-weight: 600;
      color: #fff; background: #dc2626; border: none; border-radius: 9px;
      text-decoration: none; cursor: pointer; transition: background 0.14s;
    }

    .btn-yt:hover { background: #b91c1c; }

    .btn-share {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; font-size: 0.875rem; font-weight: 600;
      color: var(--text-2); background: none;
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer; transition: all 0.14s; font-family: inherit;
    }

    .btn-share:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .btn-share.ok    { border-color: #bbf7d0; color: #16a34a; background: #f0fdf4; }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
    }

    .footer-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700; font-size: 0.9375rem;
      color: var(--primary); margin-bottom: 4px;
    }

    .footer-note { font-size: 0.78rem; color: var(--text-3); }
    .footer-note a { color: var(--primary); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .landing-wrap  { padding: 36px 20px 36px; }
      .landing-title { font-size: 1.6rem; }
      .recipe-body   { padding: 20px 18px 28px; }
      .meal-name     { font-size: 1.5rem; }
      .meal-img-wrap { height: 220px; }
      .recipe-cols   { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div onclick="showLanding()" style="cursor:pointer">
    <div class="app-name">Help, I'm Hungry!</div>
    <div class="app-sub">Get a random recipe, start cooking</div>
  </div>
  <button class="dark-btn" id="dark-btn" onclick="toggleDark()" aria-label="Toggle dark mode"></button>
</header>

<main>
  <div id="card"></div>
</main>

<footer>
  <p class="footer-name">Help, I'm Hungry!</p>
  <p class="footer-note">Recipes from <a href="https://www.themealdb.com" target="_blank" rel="noopener">TheMealDB</a></p>
</footer>

<script>
  const BASE = 'https://www.themealdb.com/api/json/v1/1';

  const DIET_OPTIONS = [
    { label: '🍽️ Anything',   value: ''           },
    { label: '🥗 Vegetarian', value: 'Vegetarian' },
    { label: '🌱 Vegan',      value: 'Vegan'      },
    { label: '🐟 Seafood',    value: 'Seafood'    },
    { label: '🍗 Chicken',    value: 'Chicken'    },
    { label: '🥩 Beef',       value: 'Beef'       },
  ];

  const CUISINE_OPTIONS = [
    { flag: '🇺🇸', name: 'American',   area: 'United States' },
    { flag: '🇬🇧', name: 'British',    area: 'British'       },
    { flag: '🇨🇳', name: 'Chinese',    area: 'Chinese'       },
    { flag: '🇫🇷', name: 'French',     area: 'France'        },
    { flag: '🇬🇷', name: 'Greek',      area: 'Greek'         },
    { flag: '🇮🇳', name: 'Indian',     area: 'India'         },
    { flag: '🇮🇹', name: 'Italian',    area: 'Italian'       },
    { flag: '🇯🇲', name: 'Jamaican',   area: 'Jamaican'      },
    { flag: '🇯🇵', name: 'Japanese',   area: 'Japanese'      },
    { flag: '🇲🇽', name: 'Mexican',    area: 'Mexican'       },
    { flag: '🇲🇦', name: 'Moroccan',   area: 'Moroccan'      },
    { flag: '🇪🇸', name: 'Spanish',    area: 'Spanish'       },
    { flag: '🇹🇭', name: 'Thai',       area: 'Thai'          },
    { flag: '🇹🇷', name: 'Turkish',    area: 'Turkish'       },
    { flag: '🇻🇳', name: 'Vietnamese', area: 'Vietnamese'    },
  ];

  const MEAL_TYPE_OPTIONS = [
    { label: '🍴 Any',     value: ''        },
    { label: '🍲 Dinner',  value: 'Dinner'  },
    { label: '🍰 Dessert', value: 'Dessert' },
  ];

  const LOADING_MSGS = [
    'Raiding the fridge…',
    'Consulting the chef…',
    'Checking the cupboard…',
    'Flipping through the cookbook…',
    'Something smells good…',
    'Almost plated…',
  ];

  const card = document.getElementById('card');
  let msgTimer = null;
  let msgIdx   = 0;
  // '' = no restriction (not null, avoids JSON.stringify double-quote issue)
  let prefs = { diet: '', cuisine: '', mealType: '' };

  // ── Landing ───────────────────────────────────────────────────────────────
  function showLanding() {
    stopLoading();

    const dietHtml = DIET_OPTIONS.map((o, i) =>
      `<button class="pill${i === 0 && prefs.diet === '' ? ' active' : prefs.diet === o.value && prefs.diet !== '' ? ' active' : ''}"
        data-group="diet" data-value="${o.value}" onclick="selectPill(this)">${o.label}</button>`
    ).join('');

    const mealTypeHtml = MEAL_TYPE_OPTIONS.map(o =>
      `<button class="pill${prefs.mealType === o.value ? ' active' : ''}"
        data-group="mealType" data-value="${o.value}" onclick="selectPill(this)">${o.label}</button>`
    ).join('');

    const cuisineHtml = CUISINE_OPTIONS.map(c =>
      `<button class="cuisine-btn${prefs.cuisine === c.area ? ' active' : ''}"
        data-area="${c.area}" onclick="selectCuisine(this)">
        <span class="cuisine-flag">${c.flag}</span>
        <span class="cuisine-name">${c.name}</span>
      </button>`
    ).join('');

    card.innerHTML = `
      <div class="landing-wrap">
        <div class="landing-hero">🍽️</div>
        <h1 class="landing-title">What are you feeling?</h1>
        <p class="landing-sub">Tell us a little about yourself and we'll find something delicious.</p>

        <div class="pref-section">
          <div class="pref-header">
            <p class="pref-label">Any dietary restrictions?</p>
            <span class="tag tag-req">Required</span>
          </div>
          <div class="pills">${dietHtml}</div>
        </div>

        <div class="pref-section">
          <div class="pref-header">
            <p class="pref-label">What type of meal?</p>
            <span class="tag tag-opt">Optional</span>
          </div>
          <div class="pills">${mealTypeHtml}</div>
        </div>

        <div class="pref-section">
          <div class="pref-header">
            <p class="pref-label">Cuisine preference</p>
            <span class="tag tag-opt">Optional — click a flag to pick, click again to clear</span>
          </div>
          <div class="cuisine-grid">${cuisineHtml}</div>
        </div>

        <button class="btn-feed" onclick="loadMeal()">Feed Me! →</button>
        <p class="landing-note">Powered by TheMealDB — completely free, no account needed.</p>
      </div>`;
  }

  // Read value from data-value attr — avoids double-quote HTML attribute breakage
  function selectPill(el) {
    const group = el.dataset.group;
    const value = el.dataset.value; // always a string, '' for "no restriction"
    document.querySelectorAll(`[data-group="${group}"]`).forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    prefs[group] = value;
  }

  // Toggle behaviour: click again to deselect
  function selectCuisine(el) {
    const wasActive = el.classList.contains('active');
    document.querySelectorAll('.cuisine-btn').forEach(b => b.classList.remove('active'));
    if (!wasActive) {
      el.classList.add('active');
      prefs.cuisine = el.dataset.area;
    } else {
      prefs.cuisine = '';
    }
  }

  // ── Loading ───────────────────────────────────────────────────────────────
  function showLoading() {
    card.innerHTML = `
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p class="loading-msg" id="lmsg">${LOADING_MSGS[0]}</p>
      </div>`;
    msgIdx = 0;
    msgTimer = setInterval(() => {
      msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
      const el = document.getElementById('lmsg');
      if (el) el.textContent = LOADING_MSGS[msgIdx];
    }, 1800);
  }

  function stopLoading() {
    clearInterval(msgTimer);
    msgTimer = null;
  }

  // ── Error ─────────────────────────────────────────────────────────────────
  function showError(msg) {
    card.innerHTML = `
      <div class="error-wrap">
        <div class="error-emoji">😩</div>
        <p class="error-title">Couldn't find a recipe</p>
        <p class="error-detail">${esc(msg)}</p>
        <div class="error-actions">
          <button class="btn-retry" onclick="loadMeal()">Try again</button>
          <button class="btn-back-ghost" onclick="showLanding()">Change preferences</button>
        </div>
      </div>`;
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function loadMeal() {
    showLoading();
    try {
      const meal = await fetchMeal();
      stopLoading();
      showMeal(meal);
    } catch (err) {
      stopLoading();
      showError(err.message);
    }
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function fetchMeal() {
    const diet     = prefs.diet;
    const cuisine  = prefs.cuisine;
    const mealType = prefs.mealType;

    // "Dinner" means any main course (the default for most meals), treat like no mealType
    const typeFilter = mealType && mealType !== 'Dinner' ? mealType : '';

    // No constraints at all → random
    if (!diet && !cuisine && !typeFilter && (!mealType || mealType === 'Dinner')) return fetchRandom();

    // Diet only (no cuisine, no type filter) → category filter → random pick
    if (diet && !cuisine && !typeFilter) return lookupRandom(await fetchList('c', diet));

    // Cuisine only (no diet, no type filter) → area filter → random pick
    if (!diet && cuisine && !typeFilter) return lookupRandom(await fetchList('a', cuisine));

    // Type only (no diet, no cuisine) → type category → random pick
    if (!diet && !cuisine && typeFilter) return lookupRandom(await fetchTypePool(typeFilter));

    // Two or more active constraints: build best pool, scan for matches
    const pool = cuisine    ? await fetchList('a', cuisine)      :
                 typeFilter ? await fetchTypePool(typeFilter)     :
                              await fetchList('c', diet);

    const meal = await scanForPrefs(pool, diet, mealType);
    if (meal) return meal;

    // Nothing matched all constraints — retry with relaxed mealType before giving up
    if (mealType === 'Dinner') {
      // Still exclude Dessert — user wanted a meal, not a cake
      const fallback = await scanForPrefs(pool, diet, 'NoDessert');
      if (fallback) return fallback;
    }

    const desc = [mealType, diet, cuisine].filter(Boolean).join(' + ');
    throw new Error('No ' + desc + ' recipe found — try a different combination');
  }

  // Return a meal stub list for the given meal type
  async function fetchTypePool(mealType) {
    if (mealType === 'Dessert') return fetchList('c', 'Dessert');
    if (mealType === 'Snack')   return fetchList('c', 'Starter');
    return fetchList('c', 'Miscellaneous');
  }

  // Scan pool in parallel batches of 6, returning first meal that satisfies diet + mealType
  async function scanForPrefs(pool, diet, mealType) {
    const shuffled = pool.slice().sort(() => Math.random() - 0.5);
    const BATCH = 6;
    for (let i = 0; i < shuffled.length; i += BATCH) {
      const batch   = shuffled.slice(i, i + BATCH);
      const settled = await Promise.allSettled(
        batch.map(s =>
          fetch(BASE + '/lookup.php?i=' + s.idMeal)
            .then(r => r.json())
            .then(d => d.meals && d.meals[0])
        )
      );
      for (const r of settled) {
        if (r.status !== 'fulfilled' || !r.value) continue;
        if (!meetsDiet(r.value, diet)) continue;
        if (!meetsMealType(r.value, mealType)) continue;
        return r.value;
      }
    }
    return null;
  }

  async function fetchRandom() {
    const res  = await fetch(BASE + '/random.php');
    if (!res.ok) throw new Error('Random API returned HTTP ' + res.status);
    const meal = (await res.json()).meals?.[0];
    if (!meal) throw new Error('No meal returned from API');
    return meal;
  }

  async function lookupRandom(list) {
    const pick = list[Math.floor(Math.random() * list.length)];
    const res  = await fetch(BASE + '/lookup.php?i=' + pick.idMeal);
    if (!res.ok) throw new Error('Lookup returned HTTP ' + res.status);
    const meal = (await res.json()).meals?.[0];
    if (!meal) throw new Error('No meal data in lookup response');
    return meal;
  }

  async function fetchList(param, value) {
    const res  = await fetch(BASE + '/filter.php?' + param + '=' + encodeURIComponent(value));
    if (!res.ok) throw new Error('Filter API returned HTTP ' + res.status);
    const data = await res.json();
    if (!data.meals || !data.meals.length) throw new Error('No ' + value + ' recipes found');
    return data.meals;
  }

  // ── Diet checks via ingredient scanning ───────────────────────────────────
  const NON_VEGETARIAN = [
    'chicken', 'beef', 'lamb', 'pork', 'ham', 'bacon', 'turkey', 'duck', 'veal',
    'venison', 'steak', 'mince', 'sausage', 'salami', 'prosciutto', 'chorizo',
    'pepperoni', 'anchovy', 'anchovies', 'salmon', 'tuna', 'cod', 'haddock',
    'trout', 'mackerel', 'sardine', 'prawn', 'shrimp', 'lobster', 'crab',
    'squid', 'scallop', 'mussel', 'clam', 'oyster', 'gelatin', 'lard', 'suet',
    'fish', 'meat', 'liver', 'kidney', 'worcestershire',
  ];

  const NON_VEGAN = NON_VEGETARIAN.concat([
    'milk', 'cream', 'butter', 'cheese', 'yogurt', 'yoghurt', 'ghee', 'paneer',
    'egg', 'eggs', 'honey', 'whey',
  ]);

  const SEAFOOD_TERMS = [
    'fish', 'salmon', 'tuna', 'cod', 'haddock', 'trout', 'mackerel', 'sardine',
    'anchovy', 'anchovies', 'prawn', 'shrimp', 'lobster', 'crab', 'squid',
    'scallop', 'mussel', 'clam', 'oyster',
  ];

  function meetsDiet(meal, diet) {
    switch (diet) {
      case 'Vegetarian': return !ingredientsContain(meal, NON_VEGETARIAN);
      case 'Vegan':      return !ingredientsContain(meal, NON_VEGAN);
      case 'Chicken':    return ingredientsContain(meal, ['chicken']);
      case 'Beef':       return ingredientsContain(meal, ['beef', 'steak', 'mince']);
      case 'Seafood':    return ingredientsContain(meal, SEAFOOD_TERMS);
      default:           return true;
    }
  }

  function meetsMealType(meal, mealType) {
    if (!mealType) return true;
    const cat = meal.strCategory || '';
    if (mealType === 'Dessert')   return cat === 'Dessert';
    if (mealType === 'Dinner')    return cat !== 'Dessert' && cat !== 'Starter' && cat !== 'Side' && cat !== 'Breakfast';
    if (mealType === 'NoDessert') return cat !== 'Dessert'; // fallback: at least not a dessert
    return true;
  }

  function ingredientsContain(meal, terms) {
    for (let i = 1; i <= 20; i++) {
      const ing = (meal['strIngredient' + i] || '').toLowerCase().trim();
      if (!ing) continue;
      for (let j = 0; j < terms.length; j++) {
        const t = terms[j];
        if (ing === t || ing.startsWith(t + ' ') || ing.endsWith(' ' + t) || ing.includes(' ' + t + ' ')) return true;
      }
    }
    return false;
  }

  function estimateTime(instructions) {
    const w = (instructions || '').split(/\s+/).filter(Boolean).length;
    if (w <= 150) return '~15 min';
    if (w <= 300) return '~30 min';
    if (w <= 500) return '~45 min';
    return '60+ min';
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function showMeal(m) {
    let ingHtml = '';
    for (let i = 1; i <= 20; i++) {
      const name    = (m[`strIngredient${i}`] || '').trim();
      const measure = (m[`strMeasure${i}`]    || '').trim();
      if (!name) continue;
      ingHtml += `
        <li class="ing-item">
          <span class="ing-measure">${esc(measure)}</span>
          <span class="ing-name">${esc(name)}</span>
        </li>`;
    }

    // Strip bare step-number lines ("1", "STEP 2", "Step 3:") and clean "1. " prefixes
    const steps = (m.strInstructions || '')
      .trim()
      .split(/\r?\n+/)
      .map(s => s.trim())
      .filter(s => s.length > 0 && !/^(step\s*)?\d+[.:]?\s*$/i.test(s))
      .map(s => s.replace(/^(step\s*)?\d+[.:]\s*/i, '').trim())
      .filter(Boolean);

    const stepsHtml = steps.map((s, i) => `
      <div class="step">
        <span class="step-num">${i + 1}</span>
        <p class="step-text">${esc(s)}</p>
      </div>`).join('');

    const ytHtml = m.strYoutube ? `
      <a class="btn-yt" href="${esc(m.strYoutube)}" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.3 31.3 0 0 0 0 12a31.3 31.3 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.3 31.3 0 0 0 24 12a31.3 31.3 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/>
        </svg>
        Watch on YouTube
      </a>` : '';

    card.innerHTML = `
      <div class="meal-img-wrap">
        <img class="meal-img" src="${esc(m.strMealThumb)}" alt="${esc(m.strMeal)}" />
      </div>
      <div class="recipe-body">
        <div class="meta-row">
          ${m.strCategory ? `<span class="badge badge-cat">${esc(m.strCategory)}</span>` : ''}
          ${m.strArea     ? `<span class="badge badge-area">${esc(m.strArea)}</span>`    : ''}
          <span class="badge badge-time">⏱ ${estimateTime(m.strInstructions)}</span>
        </div>
        <h2 class="meal-name">${esc(m.strMeal)}</h2>
        <button class="btn-roll" onclick="loadMeal()">🎲 Feed me something else</button>
        <button class="btn-change-prefs" onclick="showLanding()">← Change preferences</button>
        <div class="divider"></div>
        <div class="recipe-cols">
          <div>
            <p class="section-label">Ingredients</p>
            <ul class="ing-list">${ingHtml}</ul>
          </div>
          <div>
            <p class="section-label">Instructions</p>
            <div class="steps">${stepsHtml}</div>
          </div>
        </div>
        <div class="recipe-actions">
          ${ytHtml}
          <button class="btn-share"
            data-name="${esc(m.strMeal)}"
            data-id="${m.idMeal}"
            data-cat="${esc(m.strCategory)}"
            data-area="${esc(m.strArea)}"
            onclick="shareMealFromBtn(this)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share
          </button>
        </div>
      </div>`;
  }

  function shareMealFromBtn(btn) {
    const url  = 'https://www.themealdb.com/meal/' + btn.dataset.id;
    const orig = btn.innerHTML;
    navigator.clipboard.writeText(url).then(() => {
      btn.classList.add('ok');
      btn.textContent = '✓ Link copied!';
      setTimeout(() => { btn.classList.remove('ok'); btn.innerHTML = orig; }, 2200);
    });
  }

  // ── Dark mode ─────────────────────────────────────────────────────────────
  const MOON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  const SUN  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

  const syncIcon = () =>
    document.getElementById('dark-btn').innerHTML =
      document.body.classList.contains('dark') ? SUN : MOON;

  function toggleDark() {
    document.body.classList.toggle('dark');
    localStorage.setItem('dark', document.body.classList.contains('dark'));
    syncIcon();
  }

  if (localStorage.getItem('dark') === 'true') document.body.classList.add('dark');
  syncIcon();

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  showLanding();
</script>
</body>
</html>
