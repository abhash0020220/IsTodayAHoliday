<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help, I'm Hungry!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fffbf7;
      --surface: #ffffff;
      --primary: #f97316;
      --primary-hover: #ea580c;
      --primary-light: #fff7ed;
      --primary-border: #fed7aa;
      --text-1: #1c1917;
      --text-2: #57534e;
      --text-3: #a8a29e;
      --border: #e7e5e4;
      --shadow: 0 4px 24px rgba(0,0,0,0.09);
      --radius: 18px;
    }

    body.dark {
      --bg: #1a0e00;
      --surface: #2c1a00;
      --primary: #fb923c;
      --primary-hover: #f97316;
      --primary-light: #431407;
      --primary-border: #7c2d12;
      --text-1: #fafaf9;
      --text-2: #a8a29e;
      --text-3: #57534e;
      --border: #44403c;
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--primary);
      letter-spacing: -0.3px;
    }

    .app-sub {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-top: 2px;
    }

    .dark-btn {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      transition: all 0.14s;
      flex-shrink: 0;
    }

    .dark-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 20px 72px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 720px;
      overflow: hidden;
    }

    /* ── Loading ── */
    #loading-state {
      padding: 80px 24px;
      text-align: center;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }

    .loading-msg {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-2);
    }

    /* ── Recipe ── */
    #recipe-state { display: none; }

    .meal-img-wrap {
      position: relative;
      width: 100%;
      height: 300px;
      background: var(--border);
      overflow: hidden;
    }

    #meal-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }

    .meal-source-link {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      background: rgba(0,0,0,0.35);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .recipe-body {
      padding: 28px 32px 32px;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1.5px solid;
    }

    .badge-category {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary-border);
    }

    .badge-area {
      background: #f0fdf4;
      color: #15803d;
      border-color: #bbf7d0;
    }

    body.dark .badge-area {
      background: #052e16;
      color: #4ade80;
      border-color: #14532d;
    }

    .meal-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: 2rem;
      color: var(--text-1);
      line-height: 1.18;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }

    .btn-roll {
      width: 100%;
      padding: 16px;
      font-size: 1.0625rem;
      font-weight: 700;
      color: #ffffff;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.14s, transform 0.1s, box-shadow 0.14s;
      box-shadow: 0 4px 18px rgba(249,115,22,0.38);
      font-family: inherit;
      margin-bottom: 32px;
    }

    .btn-roll:hover {
      background: var(--primary-hover);
      box-shadow: 0 6px 22px rgba(249,115,22,0.45);
    }

    .btn-roll:active { transform: scale(0.98); }
    .btn-roll:disabled { opacity: 0.65; cursor: not-allowed; transform: none !important; }

    @keyframes spin-small { to { transform: rotate(360deg); } }
    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin-small 0.7s linear infinite;
    }

    /* ── Recipe content ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 28px;
    }

    .recipe-cols {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 32px;
      align-items: start;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
      margin-bottom: 14px;
    }

    /* Ingredients */
    .ingredients-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ingredient-item {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .ingredient-measure {
      font-weight: 700;
      color: var(--primary);
      flex-shrink: 0;
      min-width: 60px;
      font-size: 0.8rem;
    }

    .ingredient-name {
      color: var(--text-1);
    }

    /* Instructions */
    .instructions-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .instruction-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary);
      border: 1.5px solid var(--primary-border);
      font-size: 0.72rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 0.875rem;
      color: var(--text-2);
      line-height: 1.6;
    }

    /* ── Actions ── */
    .recipe-actions {
      display: flex;
      gap: 10px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .btn-yt {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #ffffff;
      background: #dc2626;
      border: none;
      border-radius: 9px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.14s;
      font-family: inherit;
    }

    .btn-yt:hover { background: #b91c1c; }

    .btn-share {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-2);
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.14s;
      font-family: inherit;
    }

    .btn-share:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .btn-share.ok {
      border-color: #bbf7d0;
      color: #16a34a;
      background: #f0fdf4;
    }

    /* ── Error ── */
    #error-state {
      display: none;
      padding: 60px 24px;
      text-align: center;
    }

    .error-emoji { font-size: 2.5rem; margin-bottom: 14px; }
    .error-title { font-size: 1.1rem; font-weight: 700; color: var(--text-1); margin-bottom: 8px; }
    .error-msg   { font-size: 0.875rem; color: var(--text-2); margin-bottom: 20px; }

    .btn-retry {
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.14s;
    }

    .btn-retry:hover { background: var(--primary-hover); }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
    }

    .footer-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 0.9375rem;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .footer-note {
      font-size: 0.78rem;
      color: var(--text-3);
      line-height: 1.6;
    }

    .footer-note a { color: var(--primary); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .recipe-body { padding: 22px 20px 26px; }
      .meal-name { font-size: 1.5rem; }
      .meal-img-wrap { height: 220px; }
      .recipe-cols { grid-template-columns: 1fr; gap: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="app-name">Help, I'm Hungry!</div>
    <div class="app-sub">Get a random recipe, start cooking</div>
  </div>
  <button class="dark-btn" id="dark-btn" onclick="toggleDark()" aria-label="Toggle dark mode"></button>
</header>

<main>
  <div class="card">

    <!-- Loading -->
    <div id="loading-state">
      <div class="spinner"></div>
      <p class="loading-msg" id="loading-msg">Raiding the fridge…</p>
    </div>

    <!-- Recipe -->
    <div id="recipe-state">
      <div class="meal-img-wrap">
        <img id="meal-img" alt="" />
        <a id="meal-source" class="meal-source-link" target="_blank" rel="noopener">View full recipe ↗</a>
      </div>

      <div class="recipe-body">
        <div class="meta-row">
          <span class="badge badge-category" id="meal-category"></span>
          <span class="badge badge-area" id="meal-area"></span>
        </div>

        <h2 class="meal-name" id="meal-name"></h2>

        <button class="btn-roll" id="roll-btn" onclick="loadMeal()">
          <span id="roll-inner">🎲 Feed me something else</span>
        </button>

        <div class="divider"></div>

        <div class="recipe-cols">
          <div class="ingredients-section">
            <p class="section-title">Ingredients</p>
            <ul class="ingredients-list" id="ingredients-list"></ul>
          </div>

          <div class="instructions-section">
            <p class="section-title">Instructions</p>
            <div class="instructions-body" id="instructions-body"></div>
          </div>
        </div>

        <div class="recipe-actions" id="recipe-actions"></div>
      </div>
    </div>

    <!-- Error -->
    <div id="error-state">
      <div class="error-emoji">😩</div>
      <p class="error-title">Something went wrong</p>
      <p class="error-msg" id="error-msg"></p>
      <button class="btn-retry" onclick="loadMeal()">Try again</button>
    </div>

  </div>
</main>

<footer>
  <p class="footer-name">Help, I'm Hungry!</p>
  <p class="footer-note">Recipes from <a href="https://www.themealdb.com" target="_blank" rel="noopener">TheMealDB</a></p>
</footer>

<script>
  const API = 'https://www.themealdb.com/api/json/v1/1/random.php';

  const LOADING_MSGS = [
    'Raiding the fridge…',
    'Consulting the chef…',
    'Checking what\'s in the cupboard…',
    'Flipping through the cookbook…',
    'Something smells good…',
    'Almost plated…',
  ];

  let msgInterval = null;
  let currentMeal = null;

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const loadEl   = $('loading-state');
  const recipeEl = $('recipe-state');
  const errorEl  = $('error-state');

  function show(s) {
    loadEl.style.display   = s === 'load'   ? '' : 'none';
    recipeEl.style.display = s === 'recipe' ? '' : 'none';
    errorEl.style.display  = s === 'error'  ? '' : 'none';
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function loadMeal() {
    setRolling(true);
    show('load');
    startLoadingMsgs();

    try {
      const res  = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const meal = data.meals?.[0];
      if (!meal) throw new Error('No meal returned');
      currentMeal = meal;
      renderMeal(meal);
      show('recipe');
    } catch (e) {
      show('error');
      $('error-msg').textContent = e.message;
    } finally {
      setRolling(false);
      stopLoadingMsgs();
    }
  }

  function setRolling(on) {
    const btn = $('roll-btn');
    btn.disabled = on;
    $('roll-inner').innerHTML = on
      ? '<span class="btn-spinner"></span> Finding something good…'
      : '🎲 Feed me something else';
  }

  function startLoadingMsgs() {
    let i = 0;
    $('loading-msg').textContent = LOADING_MSGS[0];
    msgInterval = setInterval(() => {
      i = (i + 1) % LOADING_MSGS.length;
      $('loading-msg').textContent = LOADING_MSGS[i];
    }, 1800);
  }

  function stopLoadingMsgs() {
    clearInterval(msgInterval);
    msgInterval = null;
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderMeal(m) {
    // Image
    const img = $('meal-img');
    img.style.opacity = '0';
    img.src = m.strMealThumb;
    img.alt = m.strMeal;
    img.onload = () => { img.style.opacity = '1'; };

    // Source link
    const src = $('meal-source');
    src.href = m.strSource || `https://www.themealdb.com/meal/${m.idMeal}`;

    // Name & badges
    $('meal-name').textContent = m.strMeal;
    $('meal-category').textContent = m.strCategory || '';
    $('meal-area').textContent = m.strArea || '';

    // Ingredients
    const ul = $('ingredients-list');
    ul.innerHTML = '';
    for (let i = 1; i <= 20; i++) {
      const name    = (m[`strIngredient${i}`] || '').trim();
      const measure = (m[`strMeasure${i}`]    || '').trim();
      if (!name) continue;
      const li = document.createElement('li');
      li.className = 'ingredient-item';
      li.innerHTML = `
        <span class="ingredient-measure">${esc(measure)}</span>
        <span class="ingredient-name">${esc(name)}</span>`;
      ul.appendChild(li);
    }

    // Instructions — split into steps
    const body = $('instructions-body');
    body.innerHTML = '';
    const raw   = (m.strInstructions || '').trim();
    const steps = raw.split(/\r?\n+/).map(s => s.trim()).filter(Boolean);
    steps.forEach((step, i) => {
      const div = document.createElement('div');
      div.className = 'instruction-step';
      div.innerHTML = `
        <span class="step-num">${i + 1}</span>
        <p class="step-text">${esc(step)}</p>`;
      body.appendChild(div);
    });

    // Actions
    const actions = $('recipe-actions');
    actions.innerHTML = '';

    if (m.strYoutube) {
      const a = document.createElement('a');
      a.className = 'btn-yt';
      a.href = m.strYoutube;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.3 31.3 0 0 0 0 12a31.3 31.3 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.3 31.3 0 0 0 24 12a31.3 31.3 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg> Watch on YouTube`;
      actions.appendChild(a);
    }

    const shareBtn = document.createElement('button');
    shareBtn.className = 'btn-share';
    shareBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share`;
    shareBtn.onclick = () => shareMeal(shareBtn, m);
    actions.appendChild(shareBtn);
  }

  function shareMeal(btn, m) {
    const text = `🍽️ ${m.strMeal}\n\nCategory: ${m.strCategory} · Cuisine: ${m.strArea}\n\nGet the full recipe: https://www.themealdb.com/meal/${m.idMeal}`;
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('ok');
      btn.textContent = '✓ Copied!';
      setTimeout(() => {
        btn.classList.remove('ok');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share`;
      }, 2200);
    });
  }

  // ── Dark mode ─────────────────────────────────────────────────────────────
  const MOON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  const SUN  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

  const syncIcon = () => $('dark-btn').innerHTML = document.body.classList.contains('dark') ? SUN : MOON;

  function toggleDark() {
    document.body.classList.toggle('dark');
    localStorage.setItem('dark', document.body.classList.contains('dark'));
    syncIcon();
  }

  if (localStorage.getItem('dark') === 'true') document.body.classList.add('dark');
  syncIcon();

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadMeal();
</script>
</body>
</html>
